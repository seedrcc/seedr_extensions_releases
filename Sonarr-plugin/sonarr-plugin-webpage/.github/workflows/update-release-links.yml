name: Update Release Links

on:
  release:
    types: [published, edited, released, prereleased]
  workflow_dispatch: # Allows manual triggering

jobs:
  update-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get default branch
        id: branch
        run: |
          # Get the default branch from the repository
          DEFAULT_BRANCH=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}" | jq -r '.default_branch // "main"')

          if [ -z "$DEFAULT_BRANCH" ] || [ "$DEFAULT_BRANCH" = "null" ]; then
            # Fallback to common branch names
            if git show-ref --verify --quiet refs/remotes/origin/main 2>/dev/null; then
              DEFAULT_BRANCH="main"
            elif git show-ref --verify --quiet refs/remotes/origin/master 2>/dev/null; then
              DEFAULT_BRANCH="master"
            else
              DEFAULT_BRANCH="main"
            fi
          fi

          echo "branch=$DEFAULT_BRANCH" >> $GITHUB_OUTPUT
          echo "✅ Default branch: $DEFAULT_BRANCH"

      - name: Checkout default branch
        run: |
          git checkout ${{ steps.branch.outputs.branch }}
          echo "✅ Checked out branch: ${{ steps.branch.outputs.branch }}"

      - name: Get release info
        id: release
        run: |
          # Determine which release to use
          if [ "${{ github.event_name }}" = "release" ]; then
            # Use the release that triggered the workflow
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            RELEASE_ID="${{ github.event.release.id }}"
            echo "Using release event: tag=$RELEASE_TAG, id=$RELEASE_ID"
            
            # Get the specific release by ID
            RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID")
          else
            # Manual trigger - use latest release
            echo "Using manual trigger - fetching latest release"
            RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest")
            RELEASE_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
            RELEASE_ID=$(echo "$RELEASE_DATA" | jq -r '.id')
          fi

          # Extract release info
          RELEASE_NAME=$(echo "$RELEASE_DATA" | jq -r '.name // .tag_name')

          # Find the ZIP file in release assets
          ZIP_FILE=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | endswith(".zip") and (contains("SonarrSeedr") or contains("sonarr"))) | .browser_download_url' | head -1)

          if [ -z "$ZIP_FILE" ] || [ "$ZIP_FILE" = "null" ]; then
            echo "❌ Error: No ZIP file found in release assets"
            echo "Release data:"
            echo "$RELEASE_DATA" | jq '.assets[] | .name'
            exit 1
          fi

          ZIP_FILENAME=$(basename "$ZIP_FILE")

          # Find the installer EXE file in release assets
          INSTALLER_FILE=$(echo "$RELEASE_DATA" | jq -r '.assets[] | select(.name | endswith(".exe") and (contains("Setup") or contains("Installer") or contains("setup") or contains("installer")) and (contains("SonarrSeedr") or contains("sonarr"))) | .browser_download_url' | head -1)

          if [ -z "$INSTALLER_FILE" ] || [ "$INSTALLER_FILE" = "null" ]; then
            echo "⚠️  No installer found in release assets (this is optional)"
            INSTALLER_FILENAME=""
          else
            INSTALLER_FILENAME=$(basename "$INSTALLER_FILE")
            echo "✅ Found installer: $INSTALLER_FILENAME"
          fi

          echo "✅ Found ZIP file: $ZIP_FILENAME"
          echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "zip_url=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "zip_filename=$ZIP_FILENAME" >> $GITHUB_OUTPUT
          echo "installer_url=$INSTALLER_FILE" >> $GITHUB_OUTPUT
          echo "installer_filename=$INSTALLER_FILENAME" >> $GITHUB_OUTPUT

      - name: Update index.html
        env:
          ZIP_URL: ${{ steps.release.outputs.zip_url }}
          INSTALLER_URL: ${{ steps.release.outputs.installer_url }}
        run: |
          # Update download links in index.html (ZIP + Installer) using Python for multiline support
          python3 << 'PYTHON_SCRIPT'
          import re
          import os

          zip_url = os.environ.get('ZIP_URL', '')
          installer_url = os.environ.get('INSTALLER_URL', '')

          # Read the file
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          original_content = content

          # ========== UPDATE ZIP LINKS ==========
          # Pattern 1: Match the full href with multiline support (URL on one line, attributes on next)
          pattern1 = r'href="https://github\.com/jose987654/sonarr-plugin/releases/download/[^"]*\.zip"'
          content = re.sub(pattern1, f'href="{zip_url}"', content)

          # Pattern 2: Match just the URL part (handles multiline href - matches URL until quote or newline)
          pattern2 = r'https://github\.com/jose987654/sonarr-plugin/releases/download/[^"\n]*\.zip'
          content = re.sub(pattern2, zip_url, content)

          # Pattern 3: Match old ZIP file patterns
          pattern3 = r'releases/SonarrSeedr-[^"\']*\.zip'
          content = re.sub(pattern3, zip_url, content)

          # Ensure download attribute is present (remove target="_blank" if exists)
          content = re.sub(
              rf'href="{re.escape(zip_url)}" class="btn btn-primary" target="_blank"',
              f'href="{zip_url}" class="btn btn-primary" download',
              content
          )

          # Add download attribute if missing (handle multiline)
          # Handle multiline case where href and class are on different lines
          # Pattern: href="URL"\n    class="btn btn-primary" (without download)
          multiline_pattern = rf'href="{re.escape(zip_url)}"\s*\n\s*class="btn btn-primary"(?!\s+download)'
          content = re.sub(
              multiline_pattern,
              f'href="{zip_url}" class="btn btn-primary" download',
              content,
              flags=re.MULTILINE | re.DOTALL
          )

          # Handle single-line case: href="URL" class="btn btn-primary" (without download)
          singleline_pattern = rf'href="{re.escape(zip_url)}" class="btn btn-primary"(?!\s+download)'
          content = re.sub(
              singleline_pattern,
              f'href="{zip_url}" class="btn btn-primary" download',
              content
          )

          # Also ensure download is on the same line as class (fix multiline download attribute)
          content = re.sub(
              rf'href="{re.escape(zip_url)}"\s*\n\s*class="btn btn-primary"\s*\n\s*download',
              f'href="{zip_url}" class="btn btn-primary" download',
              content,
              flags=re.MULTILINE
          )

          # ========== UPDATE INSTALLER LINKS (if exists) ==========
          if installer_url and installer_url != "null" and installer_url != "":
              # Pattern 1: Match the full href with multiline support
              pattern1_inst = r'href="https://github\.com/jose987654/sonarr-plugin/releases/download/[^"]*\.exe"'
              content = re.sub(pattern1_inst, f'href="{installer_url}"', content)

              # Pattern 2: Match just the URL part
              pattern2_inst = r'https://github\.com/jose987654/sonarr-plugin/releases/download/[^"\n]*\.exe'
              content = re.sub(pattern2_inst, installer_url, content)

              # Pattern 3: Match old installer file patterns
              pattern3_inst = r'releases/SonarrSeedr-[^"\']*\.exe'
              content = re.sub(pattern3_inst, installer_url, content)

              # Ensure download attribute is present (remove target="_blank" if exists)
              content = re.sub(
                  rf'href="{re.escape(installer_url)}" class="btn btn-primary" target="_blank"',
                  f'href="{installer_url}" class="btn btn-primary" download',
                  content
              )

              # Add download attribute if missing (handle multiline)
              multiline_pattern_inst = rf'href="{re.escape(installer_url)}"\s*\n\s*class="btn btn-primary"(?!\s+download)'
              content = re.sub(
                  multiline_pattern_inst,
                  f'href="{installer_url}" class="btn btn-primary" download',
                  content,
                  flags=re.MULTILINE | re.DOTALL
              )

              # Handle single-line case
              singleline_pattern_inst = rf'href="{re.escape(installer_url)}" class="btn btn-primary"(?!\s+download)'
              content = re.sub(
                  singleline_pattern_inst,
                  f'href="{installer_url}" class="btn btn-primary" download',
                  content
              )

              # Fix multiline download attribute
              content = re.sub(
                  rf'href="{re.escape(installer_url)}"\s*\n\s*class="btn btn-primary"\s*\n\s*download',
                  f'href="{installer_url}" class="btn btn-primary" download',
                  content,
                  flags=re.MULTILINE
              )

              print(f"✅ Updated ZIP and Installer links in index.html")
          else:
              print(f"✅ Updated ZIP link in index.html (no installer found)")

          # Write back if changed
          if content != original_content:
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"✅ Updated index.html to point to ZIP file")
          else:
              print("ℹ️  No changes needed in index.html")
          PYTHON_SCRIPT

          echo "✅ Updated index.html - ZIP: ${{ steps.release.outputs.zip_filename }}, Installer: ${{ steps.release.outputs.installer_filename }}"

      - name: Update README.md
        env:
          ZIP_URL: ${{ steps.release.outputs.zip_url }}
          ZIP_FILENAME: ${{ steps.release.outputs.zip_filename }}
        run: |
          # Update all references in README.md using Python for robust pattern matching
          python3 << 'PYTHON_SCRIPT'
          import re
          import os

          zip_url = os.environ.get('ZIP_URL', '')
          zip_filename = os.environ.get('ZIP_FILENAME', '')

          # Read the file
          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          original_content = content

          # Pattern 1: Match markdown links with backticks: [`filename.zip`](url)
          pattern1 = r'\[`SonarrSeedr-[^`]*\.zip`\]\(https://github\.com/jose987654/sonarr-plugin/releases/[^)]*\)'
          content = re.sub(pattern1, f'[`{zip_filename}`]({zip_url})', content)

          # Pattern 2: Match any GitHub releases URL in markdown links
          pattern2 = r'\(https://github\.com/jose987654/sonarr-plugin/releases/[^)]+\)'
          content = re.sub(pattern2, f'({zip_url})', content)

          # Pattern 3: Match "Download from GitHub Releases" or similar text links
          pattern3 = r'\[Download from GitHub Releases\]\([^)]+\)'
          content = re.sub(pattern3, f'[`{zip_filename}`]({zip_url})', content)

          # Pattern 4: Match "Latest Release on GitHub" or similar text links
          pattern4 = r'\[Latest Release on GitHub\]\([^)]+\)'
          content = re.sub(pattern4, f'[`{zip_filename}`]({zip_url})', content)

          # Pattern 5: Match any remaining GitHub releases URLs (standalone or in text)
          pattern5 = r'https://github\.com/jose987654/sonarr-plugin/releases/[^\s)]+'
          content = re.sub(pattern5, zip_url, content)

          # Write back if changed
          if content != original_content:
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"✅ Updated README.md to point to ZIP file: {zip_filename}")
          else:
              print("ℹ️  No changes needed in README.md")
          PYTHON_SCRIPT

          echo "✅ Updated README.md to point to ZIP file: ${{ steps.release.outputs.zip_filename }}"

      - name: Update WINDOWS_SETUP_GUIDE.html
        run: |
          ZIP_URL="${{ steps.release.outputs.zip_url }}"
          ZIP_FILENAME="${{ steps.release.outputs.zip_filename }}"

          # Update reference in WINDOWS_SETUP_GUIDE.html to point directly to ZIP file
          sed -i "s|https://github.com/jose987654/sonarr-plugin/releases/[^<]*|$ZIP_URL|g" WINDOWS_SETUP_GUIDE.html
          sed -i "s|<a href=\"[^\"]*releases[^\"]*\"[^>]*>GitHub Releases</a>|<a href=\"$ZIP_URL\" download>$ZIP_FILENAME</a>|g" WINDOWS_SETUP_GUIDE.html
          sed -i "s|<code>SonarrSeedr-[^<]*\.zip</code>|<a href=\"$ZIP_URL\" download>$ZIP_FILENAME</a>|g" WINDOWS_SETUP_GUIDE.html

          echo "✅ Updated WINDOWS_SETUP_GUIDE.html to point to ZIP file: $ZIP_FILENAME"

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html README.md WINDOWS_SETUP_GUIDE.html

          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
          else
            git commit -m "📦 Auto-update: Link to latest GitHub release ${{ steps.release.outputs.tag }}"
            git push origin ${{ steps.branch.outputs.branch }}
            echo "✅ Successfully pushed changes to ${{ steps.branch.outputs.branch }}"
          fi
