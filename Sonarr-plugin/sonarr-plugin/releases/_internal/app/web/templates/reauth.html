<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticate - Sonarr-Seedr Integration</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <script src="../static/js/app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .auth-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 2rem;
        }

        .seedr-logo-img {
            height: 60px;
            width: auto;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 1rem;
        }

        p {
            color: #4a5568;
            font-size: 1.05rem;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        ul {
            list-style: none;
            text-align: left;
            margin: 1.5rem auto 2rem;
            max-width: 400px;
        }

        ul li {
            padding: 0.75rem 1rem;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            color: #2d3748;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        ul li::before {
            content: "✓";
            color: #48bb78;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .auth-status {
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .auth-status p {
            color: #2c5282;
            font-weight: 600;
            margin: 0;
        }

        .auth-actions {
            display: flex;
            justify-content: center;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .button.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 2rem;
            }

            h1 {
                font-size: 1.75rem;
            }

            .button {
                padding: 0.875rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="logo-section">
            <img src="../static/images/icon.png" alt="Seedr Logo" class="seedr-logo-img">
        </div>

        <h1>🔐 Authenticate with Seedr</h1>
        <p>You need to authenticate with Seedr to continue. This is required to:</p>

        <ul>
            <li>Add torrents to your Seedr account</li>
            <li>Monitor download progress</li>
            <li>Download completed files</li>
        </ul>

        <div class="auth-status" id="auth-status">
            <p>✨ Ready to start authentication</p>
        </div>

        <div class="auth-actions">
            <button id="start-auth" class="button primary">🚀 Start Authentication</button>
        </div>
    </div>
</body>

</html>
